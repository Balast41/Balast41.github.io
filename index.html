<!doctype html>
<html lang="fr">
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<link rel="icon" type="image/png" href="/img/Icone.png">
<link rel="stylesheet" href="styles.css"/>
<title>StarMind</title>

<!-- 🔹 Écran de connexion -->
<div id="join">
  <img src="img/Logo.png" alt="Logo Quiz" style="width:300px;"/>
  <h2>Rejoindre une partie</h2>
  <br/>
  <label>Pseudo</label>
  <input id="name" placeholder="Votre pseudo" style="width:100%; padding:10px"/>
  <br/>
  <br/>
  <button id="btnJoin">Rejoindre</button>
  <p id="status"></p>
</div>

<!-- 🔹 Écran du jeu -->
<div id="game" class="hidden">
  <h2 id="question">En attente de la première question…</h2>
  <h3 id="score">Score : 0</h3>
  <div id="choices"></div>
  <p id="timer"></p>
  <h3 id="feedback"></h3>
  <h3 id="round">Tour : 1/10</h3>
</div>

<!-- 🔹 Choix de catégorie -->
<div id="category-choice" class="hidden">
  <h2 id="category-info">Choisis une catégorie :</h2>
  <div id="category-buttons"></div>
</div>

<script src="script.js"></script>
</html>
